name: Build and Release

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - '**'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Use Node.js
      uses: actions/setup-node@v3
      with:
        node-version: 'latest'
        cache: 'npm'

    - name: Install dependencies
      run: npm install

    - name: Run tests
      run: npm run test

    - name: Build project
      run: npm run build

    - name: Push into Releases Tab
      uses: ncipollo/release-action@v1
      with:
        artifacts: "dist/antinna-engine.iife.js,dist/antinna-engine.es.js"
        tag: "v${{ github.run_number }}"
        name: "Release v${{ github.run_number }}"
        allowUpdates: true
        token: ${{ secrets.GITHUB_TOKEN }}
